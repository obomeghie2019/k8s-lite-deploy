apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: 3mtt-capstone-by-obomeghie2019-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: 3mtt-capstone-by-obomeghie2019
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 50